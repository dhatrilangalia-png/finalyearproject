{% extends "base.html" %}

{% block content %}
<div class="register-container">
  <h2>Register</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Register</button>
  </form>
  <p>Already have an account? <a href="/accounts/login/">Log in here</a>.</p>
</div>
{% endblock %}
